name: build-and-push-caddy

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Caddy version
        id: caddy_version
        run: |
          VERSION=$(grep -oP '(?<=caddy:)\d+\.\d+\.\d+' Dockerfile | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/gflorio/homelab-caddy:latest
            ghcr.io/gflorio/homelab-caddy:${{ steps.caddy_version.outputs.version }}
